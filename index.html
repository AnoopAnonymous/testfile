<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
</head>
<body>
    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <div class="screen-content">
            <h1>🐍 Snake Game</h1>
            <p class="instructions">Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to move</p>
            <p class="instructions">Eat the food to grow. Avoid walls and yourself!</p>
            <button id="start-btn" class="btn">Start Game</button>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <div class="screen-content">
            <h1>Game Over!</h1>
            <p class="final-score">Score: <span id="final-score">0</span></p>
            <p class="high-score-display">High Score: <span id="high-score-display">0</span></p>
            <button id="restart-btn" class="btn">Play Again</button>
        </div>
    </div>

    <!-- Game Container -->
    <div id="game-container" class="hidden">
        <div class="header">
            <div class="score-box">
                <span class="label">Score</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="score-box">
                <span class="label">High Score</span>
                <span id="high-score" class="value">0</span>
            </div>
        </div>
        
        <canvas id="game-canvas"></canvas>
        
        <!-- Mobile Controls -->
        <div id="mobile-controls">
            <button id="btn-up" class="control-btn">▲</button>
            <div class="control-row">
                <button id="btn-left" class="control-btn">◄</button>
                <button id="btn-right" class="control-btn">►</button>
            </div>
            <button id="btn-down" class="control-btn">▼</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
